<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>記憶カレンダー</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="記憶カレンダー" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1 id="appViewTitle">カレンダー</h1>
      <div class="header-actions">
        <button id="goCalendarBtnHeader" class="header-btn" type="button">カレンダー</button>
        <button id="goWorkoutBtnHeader" class="header-btn" type="button">筋トレ</button>
        <button id="goSettingsBtnHeader" class="icon-btn" type="button" aria-label="設定">⚙</button>
      </div>
    </header>

    <main id="view-calendar" class="view active">
      <section class="card">
        <div class="calendar-header">
          <button id="prevMonthBtn" class="nav-btn" type="button">＜</button>
          <div id="monthLabel" class="month-label">2026年4月</div>
          <button id="nextMonthBtn" class="nav-btn" type="button">＞</button>
        </div>
        <div class="weekday-row">
          <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>

      <section class="card">
        <button id="goInputBtn" class="primary-btn" type="button">入力する</button>
      </section>

      <section class="card">
        <div class="list-header">
          <h2>記録</h2>
          <span id="itemCount" class="count-badge">0件</span>
        </div>
        <div id="scheduleList" class="schedule-list">
          <p class="empty-text">まだ記録はありません。</p>
        </div>
      </section>
    </main>

    <main id="view-input" class="view">
      <section class="card">
        <div class="top-row">
          <button id="backToCalendarFromInputBtn" class="sub-btn" type="button">← 戻る</button>
        </div>

        <div class="section-title">記録入力</div>

        <div class="hidden" aria-hidden="true">
          <div id="inputTargetDateLabel"></div>
          <button id="toggleInputDatePickerBtn" type="button">日付変更</button>
          <div id="inputMiniCalendarWrap">
            <button id="miniPrevMonthBtn" type="button">＜</button>
            <div id="miniMonthLabel"></div>
            <button id="miniNextMonthBtn" type="button">＞</button>
            <div id="miniCalendarGrid"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="title">タイトル</label>
          <input id="title" type="text" placeholder="例：日報、会議、投稿ネタ" />
        </div>

        <div class="form-group">
          <label for="categorySelect">項目</label>
          <select id="categorySelect"></select>
        </div>

        <div class="time-grid">
          <div class="form-group">
            <label for="startDateTime">開始日時</label>
            <input id="startDateTime" type="datetime-local" />
            <button id="setNowStartBtn" class="mini-action-btn" type="button">現在時刻</button>
          </div>
          <div class="form-group">
            <label for="endDateTime">終了日時</label>
            <input id="endDateTime" type="datetime-local" />
            <button id="setNowEndBtn" class="mini-action-btn" type="button">現在時刻</button>
          </div>
        </div>

        <div class="form-group">
          <label for="content">内容</label>
          <textarea id="content" rows="8" placeholder="項目を選ぶとテンプレが入ります。"></textarea>
        </div>

        <div class="form-action-row">
          <button id="saveRecordBtn" class="primary-btn" type="button">保存する</button>
          <button id="cancelEditRecordBtn" class="sub-btn hidden" type="button">編集をやめる</button>
        </div>
      </section>
    </main>

    <main id="view-workout" class="view">
      <section class="card">
        <div class="hidden">
          <button id="backToCalendarFromWorkoutBtn" class="sub-btn" type="button">← 戻る</button>
          <input id="workoutDate" type="date" />
        </div>

        <div class="calendar-header">
          <button id="workoutMiniPrevMonthBtn" class="nav-btn" type="button">＜</button>
          <div id="workoutMiniMonthLabel" class="month-label">2026年4月</div>
          <button id="workoutMiniNextMonthBtn" class="nav-btn" type="button">＞</button>
        </div>

        <div class="weekday-row">
          <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
        </div>
        <div id="workoutMiniCalendarGrid" class="calendar-grid"></div>
      </section>

      <section class="card">
        <button id="goWorkoutInputBtn" class="primary-btn" type="button">入力する</button>
      </section>

      <section class="card">
        <div class="list-header">
          <h2>この日の筋トレ内容</h2>
          <span id="workoutItemCount" class="count-badge">0件</span>
        </div>
        <div id="workoutHistoryList" class="schedule-list">
          <p class="empty-text">まだ筋トレ記録はありません。</p>
        </div>
      </section>

      <section class="card">
        <div class="top-row">
          <button id="goWorkoutStatsBtn" class="sub-btn" type="button">成果グラフへ</button>
        </div>
      </section>
    </main>

    <main id="view-workout-input" class="view">
      <section class="card">
        <div class="top-row">
          <button id="backToWorkoutFromInputBtn" class="sub-btn" type="button">← 戻る</button>
        </div>

        <div class="section-title">筋トレ記録入力</div>

        <div class="form-group">
          <label>入力対象日</label>
          <div class="target-date-box">
            <div id="workoutInputTargetDateLabel" class="target-date-label">2026-04-20</div>
            <button id="toggleWorkoutInputDatePickerBtn" class="sub-btn" type="button">日付を変更</button>
          </div>
          <div id="workoutInputMiniCalendarWrap" class="mini-picker-popup hidden">
            <div class="mini-calendar-header">
              <button id="workoutInputMiniPrevMonthBtn" class="mini-nav-btn" type="button">＜</button>
              <div id="workoutInputMiniMonthLabel" class="mini-month-label">2026年4月</div>
              <button id="workoutInputMiniNextMonthBtn" class="mini-nav-btn" type="button">＞</button>
            </div>
            <div class="mini-weekday-row">
              <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
            </div>
            <div id="workoutInputMiniCalendarGrid" class="mini-calendar-grid"></div>
          </div>
        </div>

        <div class="time-grid">
          <div class="form-group">
            <label for="bodyPartSelect">部位</label>
            <select id="bodyPartSelect"></select>
          </div>
          <div class="form-group">
            <label for="exerciseSelect">メニュー</label>
            <select id="exerciseSelect"></select>
          </div>
        </div>

        <div class="top-row">
          <button id="loadPreviousWorkoutBtn" class="sub-btn" type="button">前回記録を読み出す</button>
        </div>

        <div class="time-grid">
          <div class="form-group">
            <label for="setsInput">セット数</label>
            <input id="setsInput" type="number" min="1" step="1" value="3" />
          </div>
          <div class="form-group">
            <label for="restSecInput">休憩秒数（目安）</label>
            <input id="restSecInput" type="number" min="0" step="1" value="60" />
          </div>
        </div>

        <div class="form-group">
          <label for="workoutMemo">全体メモ</label>
          <textarea id="workoutMemo" rows="3" placeholder="全体メモ"></textarea>
        </div>
      </section>

      <section class="card">
        <div class="section-title">セット記録</div>
        <div id="setFormsWrap" class="set-form-list"></div>
        <div id="workoutLogs" class="workout-log-list">
          <p class="empty-text">まだセット記録はありません。</p>
        </div>
        <div class="form-action-row">
          <button id="saveWorkoutBtn" class="primary-btn" type="button">筋トレ記録を保存</button>
          <button id="cancelEditWorkoutBtn" class="sub-btn hidden" type="button">編集をやめる</button>
        </div>
      </section>

      <section class="card">
        <div class="section-title">タイマー</div>
        <div class="timer-status-wrap">
          <div id="workoutPhaseLabel" class="timer-phase">待機中</div>
          <div id="workoutTimerDisplay" class="timer-display">00:00</div>
          <div id="workoutSetStatus" class="timer-sub">セット 0 / 0</div>
        </div>
        <div class="workout-btn-row">
          <button id="workoutMainBtn" class="primary-btn" type="button">開始</button>
          <button id="workoutResetBtn" class="sub-btn" type="button">リセット</button>
        </div>
      </section>
    </main>

    <main id="view-workout-stats" class="view">
      <section class="card">
        <div class="top-row">
          <button id="backToWorkoutFromStatsBtn" class="sub-btn" type="button">← 筋トレへ戻る</button>
        </div>

        <div class="section-title">筋トレ成果グラフ</div>

        <div class="time-grid">
          <div class="form-group">
            <label for="statsBodyPartSelect">部位</label>
            <select id="statsBodyPartSelect"></select>
          </div>
          <div class="form-group">
            <label for="statsExerciseSelect">メニュー</label>
            <select id="statsExerciseSelect"></select>
          </div>
        </div>

        <div class="stats-btn-row">
          <button id="showWeekStatsBtn" class="sub-btn" type="button">1週間</button>
          <button id="showMonthStatsBtn" class="sub-btn" type="button">1か月</button>
        </div>

        <div class="chart-wrap">
          <canvas id="statsCanvas" width="700" height="320"></canvas>
        </div>

        <div id="statsSummary" class="schedule-content">データを選択してください。</div>
      </section>
    </main>

    <main id="view-settings" class="view">
      <section class="card">
        <div class="top-row">
          <button id="backToCalendarFromSettingsBtn" class="sub-btn" type="button">← 戻る</button>
        </div>

        <div class="section-title">設定画面</div>

        <div class="settings-tabs">
          <button id="showCalendarSettingsBtn" class="header-btn active-tab" type="button">カレンダー</button>
          <button id="showWorkoutSettingsBtn" class="header-btn" type="button">筋トレ</button>
        </div>
      </section>

      <section id="calendarSettingsSection" class="settings-section">
        <section class="card">
          <div class="settings-block">
            <h3>項目を追加</h3>
            <div class="input-inline">
              <input id="newCategoryInput" type="text" placeholder="例：学習用" />
              <button id="addCategoryBtn" class="sub-btn" type="button">追加</button>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="list-header">
            <h2>カレンダー設定</h2>
          </div>
          <div id="categorySettingsList" class="settings-list">
            <p class="empty-text">項目がありません。</p>
          </div>
        </section>
      </section>

      <section id="workoutSettingsSection" class="settings-section hidden">
        <section class="card">
          <div class="settings-block">
            <h3>部位を追加</h3>
            <div class="input-inline">
              <input id="newBodyPartInput" type="text" placeholder="例：前腕" />
              <button id="addBodyPartBtn" class="sub-btn" type="button">追加</button>
            </div>
          </div>

          <div class="hidden">
            <select id="settingsBodyPartSelect"></select>
            <input id="newExerciseInput" type="text" placeholder="例：ダンベルカール" />
            <button id="addExerciseBtn" class="sub-btn" type="button">追加</button>
          </div>
        </section>

        <section class="card">
          <div class="settings-block">
            <h3>初期設定</h3>
            <div class="time-grid">
              <div class="form-group">
                <label for="defaultSetsSettingInput">初期セット数</label>
                <input id="defaultSetsSettingInput" type="number" min="1" step="1" value="3" />
              </div>
              <div class="form-group">
                <label for="defaultRestSecSettingInput">初期休憩秒数</label>
                <input id="defaultRestSecSettingInput" type="number" min="0" step="1" value="60" />
              </div>
            </div>
            <button id="saveWorkoutDefaultsBtn" class="sub-btn" type="button">初期設定を保存</button>
          </div>
        </section>

        <section class="card">
          <div class="list-header">
            <h2>筋トレ設定</h2>
          </div>
          <div id="workoutSettingsList" class="settings-list">
            <p class="empty-text">部位がありません。</p>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
